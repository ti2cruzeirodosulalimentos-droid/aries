# Deploy do ARIÉS na VPS: app (servidor Node) + Caddy (proxy reverso com HTTPS automático).
# docker compose lê o arquivo .env (ao lado deste) para preencher os ${...}.
services:
  app:
    build:
      context: .
      args:
        # Embutidas no bundle do cliente no build (vêm do .env da VPS).
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Segredos de servidor (runtime) — NUNCA vão pro bundle do cliente.
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LEMBRETE_HOOK_SECRET: ${LEMBRETE_HOOK_SECRET:-}
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
