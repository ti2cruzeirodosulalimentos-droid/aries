# ARIÉS na VPS — MODO CONVIVÊNCIA.
# Esta VPS já roda outro stack (nf-erp-demo) cujo Caddy é dono das portas 80/443.
# Por isso aqui NÃO subimos Caddy nem tocamos em 80/443: o app sobe isolado,
# publicado numa porta do host (APP_PORT, padrão 8090). Projeto/redes próprios
# (dir /opt/aries → nome "aries"), então não há conflito com o nf-erp-demo.
#
# docker compose lê o .env ao lado para preencher os ${...}.
services:
  app:
    build:
      context: .
      args:
        # Embutidas no bundle do cliente no build (vêm do .env da VPS).
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      # host:container — troque APP_PORT no .env se 8090 estiver ocupada.
      - "${APP_PORT:-8090}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Segredos de servidor (runtime) — NUNCA vão pro bundle do cliente.
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LEMBRETE_HOOK_SECRET: ${LEMBRETE_HOOK_SECRET:-}
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}
